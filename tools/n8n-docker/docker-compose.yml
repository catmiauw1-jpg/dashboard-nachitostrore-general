services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: n8n
      POSTGRES_PASSWORD: ${N8N_POSTGRES_PASSWORD:-poleraflow-local-postgres}
      POSTGRES_DB: n8n
    volumes:
      - n8n_docker_postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U n8n -d n8n"]
      interval: 10s
      timeout: 5s
      retries: 10

  n8n:
    image: n8nio/n8n:latest
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "5678:5678"
    environment:
      DB_TYPE: postgresdb
      DB_POSTGRESDB_HOST: postgres
      DB_POSTGRESDB_PORT: 5432
      DB_POSTGRESDB_DATABASE: n8n
      DB_POSTGRESDB_USER: n8n
      DB_POSTGRESDB_PASSWORD: ${N8N_POSTGRES_PASSWORD:-poleraflow-local-postgres}
      N8N_HOST: 127.0.0.1
      N8N_PORT: 5678
      N8N_PROTOCOL: http
      N8N_EDITOR_BASE_URL: http://127.0.0.1:5678
      WEBHOOK_URL: ${N8N_PUBLIC_WEBHOOK_URL:-http://127.0.0.1:5678}
      N8N_ENCRYPTION_KEY: ${N8N_ENCRYPTION_KEY:-poleraflow-local-docker-key-32-chars}
      N8N_SECURE_COOKIE: "false"
      N8N_DIAGNOSTICS_ENABLED: "false"
      N8N_VERSION_NOTIFICATIONS_ENABLED: "false"
      N8N_BLOCK_ENV_ACCESS_IN_NODE: "false"
      GENERIC_TIMEZONE: America/La_Paz
      TZ: America/La_Paz
      POLERAFLOW_BOT_URL: ${POLERAFLOW_BOT_URL:-https://admin-dhasboard.vercel.app/api/webhooks/n8n/waflow-bot}
      POLERAFLOW_WEBHOOK_SECRET: ${POLERAFLOW_WEBHOOK_SECRET}
      POLERAFLOW_WEBHOOK_URL: ${POLERAFLOW_WEBHOOK_URL:-https://admin-dhasboard.vercel.app/api/webhooks/n8n/whatsapp}
      WAFLOW_API_KEY: ${WAFLOW_API_KEY}
    volumes:
      - n8n_docker_data:/home/node/.n8n

volumes:
  n8n_docker_postgres:
  n8n_docker_data:
